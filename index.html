<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f8ff; }
        header { background: #4682b4; color: white; padding: 20px; text-align: center; }
        .container { margin: 20px auto; max-width: 600px; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px; background: #4682b4; color: white; border: none; cursor: pointer; }
        button:hover { background: #5a9bd3; }
    </style>
</head>
<body>
    <header>
        <h1>Quiz Application</h1>
    </header>
    <div class="container">
        <div id="home">
            <h2>Welcome! Enter your Nickname:</h2>
            <input type="text" id="nickname" placeholder="Nickname" />
            <button onclick="startQuiz()">Start Quiz</button>
        </div>
        <div id="adminPanel" style="display:none;">
            <h2>Admin Panel</h2>
            <input type="text" id="category" placeholder="Category" />
            <button onclick="createCategory()">Create Category</button>
            <div id="categories"></div>
            <h3>Add Question</h3>
            <input type="text" id="question" placeholder="Question" />
            <button onclick="addQuestion()">Add Question</button>
        </div>
        <div id="quizPage" style="display:none;">
            <h2>Quiz</h2>
            <div id="quizQuestions"></div>
            <button onclick="submitQuiz()">Submit Quiz</button>
        </div>
    </div>
    <script>
        function startQuiz() {
            const nickname = document.getElementById('nickname').value;
            localStorage.setItem('nickname', nickname);
            alert('Quiz Started! Hello ' + nickname);
            document.getElementById('home').style.display = 'none';
            document.getElementById('quizPage').style.display = 'block';
        }

        function createCategory() {
            const category = document.getElementById('category').value;
            if (category) {
                let categories = JSON.parse(localStorage.getItem('categories')) || [];
                categories.push(category);
                localStorage.setItem('categories', JSON.stringify(categories));
                document.getElementById('categories').innerHTML += '<div>' + category + '</div>';
                document.getElementById('category').value = '';
            }
        }

        function addQuestion() {
            const question = document.getElementById('question').value;
            if (question) {
                let questions = JSON.parse(localStorage.getItem('questions')) || [];
                questions.push(question);
                localStorage.setItem('questions', JSON.stringify(questions));
                document.getElementById('question').value = '';
            }
        }

        function submitQuiz() {
            alert('Quiz submitted!');
        }
    </script>
</body>
</html>
