<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Quiz Application</h1>
        <nav>
            <ul>
                <li><a href="#admin">Admin Panel</a></li>
                <li><a href="#quiz">Start Quiz</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="admin">
            <h2>Admin Panel</h2>
            <form id="adminForm">
                <label for="adminPassword">Password:</label>
                <input type="password" id="adminPassword" required />
                <button type="submit">Login</button>
            </form>
            <div id="adminControls" style="display:none;">
                <h3>Create Category</h3>
                <form id="categoryForm">
                    <label for="categoryName">Category Name:</label>
                    <input type="text" id="categoryName" required />
                    <button type="submit">Create</button>
                </form>
                <h3>Create Question</h3>
                <form id="questionForm">
                    <label for="questionText">Question:</label>
                    <input type="text" id="questionText" required />
                    <label for="categorySelect">Category:</label>
                    <select id="categorySelect"></select>
                    <button type="submit">Add Question</button>
                </form>
            </div>
        </section>
        <section id="quiz">
            <h2>Start Quiz</h2>
            <div id="quizContainer" style="display:none;">
                <h3 id="questionDisplay">Question will be displayed here</h3>
                <button id="nextButton">Next</button>
            </div>
        </section>
    </main>
    <script>
        const adminPassword = "admin123"; // Example password
        document.getElementById('adminForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const passwordInput = document.getElementById('adminPassword').value;
            if (passwordInput === adminPassword) {
                document.getElementById('adminControls').style.display = 'block';
            } else {
                alert('Incorrect password');
            }
        });
        document.getElementById('categoryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const categoryName = document.getElementById('categoryName').value;
            const categorySelect = document.getElementById('categorySelect');
            const newOption = document.createElement('option');
            newOption.value = categoryName;
            newOption.textContent = categoryName;
            categorySelect.appendChild(newOption);
            document.getElementById('categoryName').value = '';
        });
        // Implement question creation and quiz functionality here.
    </script>
</body>
</html>
